spring:
  application:
    name: adoptme
  
  datasource:
    url: jdbc:postgresql://localhost:5432/adoptme_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  
  security:
    filter:
      order: 5

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: on_param

# JWT Configuration
jwt:
  secret: your-secret-key-should-be-at-least-256-bits-long-for-hs256-algorithm-security
  expiration: 86400000 # 24 hours in milliseconds

# SendGrid Configuration
sendgrid:
  api-key: ${SENDGRID_API_KEY:your-sendgrid-api-key}
  from-email: ${SENDGRID_FROM_EMAIL:noreply@adoptme.com}

# OTP Configuration
otp:
  expiration: 300000 # 5 minutes in milliseconds
  length: 6

# Logging
logging:
  level:
    com.raj.adoptme: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
